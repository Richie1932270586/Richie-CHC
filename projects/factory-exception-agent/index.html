<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>厂内物流助手</title>
    <meta
      name="description"
      content="厂内物流 / 仓储 / 质检协同的单 Agent demo，正在跳转到正式聊天界面。"
    />
    <script src="../../config.js"></script>
    <style>
      :root {
        color-scheme: light;
        font-family: "Bahnschrift", "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #e9eff3 0%, #f7f9fb 100%);
        color: #15232d;
      }

      .redirect-note {
        padding: 18px 22px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.86);
        border: 1px solid rgba(21, 35, 45, 0.08);
        box-shadow: 0 18px 48px rgba(15, 23, 42, 0.08);
        font-size: 14px;
      }

      a {
        color: #075768;
      }
    </style>
  </head>
  <body>
    <div class="redirect-note">
      正在打开厂内物流助手。
      <a id="fallbackLink" href="./apps/web/dist/">如果没有自动跳转，请点击这里</a>
    </div>
    <script>
      const params = new URLSearchParams(window.location.search);
      const apiBase = String(params.get("api") || window.FACTORY_AGENT_API_BASE || "")
        .trim()
        .replace(/\/$/, "");
      const target = new URL("./apps/web/dist/", window.location.href);
      if (apiBase) {
        target.searchParams.set("api", apiBase);
      }
      if (window.location.hash) {
        target.hash = window.location.hash;
      }
      document.getElementById("fallbackLink").href = target.toString();
      window.location.replace(target.toString());
    </script>
  </body>
</html>
